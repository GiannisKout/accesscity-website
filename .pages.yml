media:
  input: media
  output: /media

content:
  - name: blog
    label: Blog posts
    type: collection
    path: content/blog
    format: json
    filename:
      template: "{slug}.json"
      field: create
    view:
      primary: greek.title
      fields:
        - greek.title
        - publishDate
        - status
      default:
        sort: publishDate
        order: desc
    fields:
      - name: slug
        label: Slug
        type: string
        description: URL-safe name used in the blog post link, for example "city-access-audit".
        required: true
      - name: status
        label: Status
        type: select
        description: Keep posts as Draft until they are ready to appear publicly.
        default: draft
        required: true
        options:
          values:
            - name: draft
              label: Draft
            - name: published
              label: Published
      - name: publishDate
        label: Publish date
        type: date
        description: The publication date used for sorting and display.
        required: true
      - name: tagStyle
        label: Tag style
        type: select
        hidden: true
        default: default
        options:
          values:
            - name: default
              label: Default
            - name: announcement
              label: Announcement
      - name: cardTheme
        label: Card theme
        type: select
        hidden: true
        default: default
        options:
          values:
            - name: default
              label: Default
            - name: alt
              label: Alternate
      - name: greek
        label: Greek content
        description: Fill in the Greek version shown on the site.
        type: object
        collapsible:
          collapsed: false
        fields:
          - name: dateLabel
            label: Date label
            type: string
            description: Human-friendly Greek date, for example "Μάιος 2026".
            required: true
          - name: category
            label: Category
            type: string
            description: Short Greek category shown on the blog card.
            required: true
          - name: title
            label: Title
            type: string
            description: Main post title in Greek.
            required: true
          - name: excerpt
            label: Excerpt
            type: text
            description: Short summary used in the blog listing and previews.
            required: true
            options:
              maxlength: 280
          - name: seoTitle
            label: SEO title
            type: string
            description: Search engine title in Greek.
            required: true
          - name: seoDescription
            label: SEO description
            type: text
            description: Search engine summary in Greek.
            required: true
            options:
              maxlength: 180
          - name: body
            label: Body
            description: Use the toolbar for headings, links, lists, and emphasis.
            type: rich-text
            required: true
            options:
              format: markdown
              switcher: true
      - name: english
        label: English content
        description: Fill in the English version shown on the site.
        type: object
        collapsible:
          collapsed: true
        fields:
          - name: dateLabel
            label: Date label
            type: string
            description: Human-friendly English date, for example "May 2026".
            required: true
          - name: category
            label: Category
            type: string
            description: Short English category shown on the blog card.
            required: true
          - name: title
            label: Title
            type: string
            description: Main post title in English.
            required: true
          - name: excerpt
            label: Excerpt
            type: text
            description: Short summary used in the blog listing and previews.
            required: true
            options:
              maxlength: 280
          - name: seoTitle
            label: SEO title
            type: string
            description: Search engine title in English.
            required: true
          - name: seoDescription
            label: SEO description
            type: text
            description: Search engine summary in English.
            required: true
            options:
              maxlength: 180
          - name: body
            label: Body
            description: Use the toolbar for headings, links, lists, and emphasis.
            type: rich-text
            required: true
            options:
              format: markdown
              switcher: true
