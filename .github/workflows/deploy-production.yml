name: Deploy Production

on:
  workflow_run:
    workflows:
      - Build Check
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      payload:
        description: "Pages CMS action payload (optional)"
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify deploy payload
        run: |
          set -euo pipefail

          test -f dist/index.html
          test -f dist/robots.txt
          test -f dist/sitemap.xml
          test -f dist/blog.html
          test -d dist/blog
          test -d dist/assets
          test -f dist/assets/app.js
          test -f dist/assets/styles.css

          grep -q 'assets/styles.css' dist/index.html
          grep -q 'assets/app.js' dist/index.html

      - name: Deploy static site to SiteGround
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          server-dir: accesscity.gr/public_html/
          local-dir: ./dist/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.vscode/**
            **/.DS_Store
            README.md
            deploy-production.command
